name: Supabase Migrations

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/*.sql'
  workflow_dispatch:
    inputs:
      target:
        description: 'Deployment target'
        required: true
        default: production
        type: choice
        options:
          - production

jobs:
  deploy-staging:
    name: Deploy Migrations (Staging)
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
      - name: Check required secrets
        id: check_secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ] || [ -z "${SUPABASE_PROJECT_REF}" ] || [ -z "${SUPABASE_DB_PASSWORD}" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Supabase staging secrets are not configured. Skipping deploy steps."
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Login Supabase CLI (Staging)
        if: ${{ steps.check_secrets.outputs.should_run == 'true' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase login --token "${SUPABASE_ACCESS_TOKEN}"
      - name: Push Migrations to Staging
        if: ${{ steps.check_secrets.outputs.should_run == 'true' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref "${SUPABASE_PROJECT_REF}"
          supabase db push --include-all --password "${SUPABASE_DB_PASSWORD}"

  deploy-production:
    name: Deploy Migrations (Production)
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'production' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
      - name: Check required secrets
        id: check_secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ] || [ -z "${SUPABASE_PROJECT_REF}" ] || [ -z "${SUPABASE_DB_PASSWORD}" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Supabase production secrets are not configured. Skipping deploy steps."
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Login Supabase CLI (Production)
        if: ${{ steps.check_secrets.outputs.should_run == 'true' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase login --token "${SUPABASE_ACCESS_TOKEN}"
      - name: Push Migrations to Production
        if: ${{ steps.check_secrets.outputs.should_run == 'true' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref "${SUPABASE_PROJECT_REF}"
          supabase db push --include-all --password "${SUPABASE_DB_PASSWORD}"
