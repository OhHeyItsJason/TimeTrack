name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  backend-sanity:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node --check backend_server.cjs
      - run: node --check import/import_base44_csv.cjs

  migration-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Migration File Naming
        run: |
          set -euo pipefail
          if ! ls supabase/migrations/*.sql >/dev/null 2>&1; then
            echo "No migration files found; skipping migration validation."
            exit 0
          fi
          bad=0
          for f in supabase/migrations/*.sql; do
            [ -f "$f" ] || continue
            name="$(basename "$f")"
            if ! echo "$name" | grep -Eq '^[0-9]{14}_[a-z0-9_]+\.sql$'; then
              echo "Invalid migration filename: $name"
              bad=1
            fi
          done
          if [ "$bad" -ne 0 ]; then
            exit 1
          fi
      - name: Validate Migration Transaction Wrapper
        run: |
          set -euo pipefail
          if ! ls supabase/migrations/*.sql >/dev/null 2>&1; then
            echo "No migration files found; skipping migration validation."
            exit 0
          fi
          bad=0
          for f in supabase/migrations/*.sql; do
            [ -f "$f" ] || continue
            upper="$(tr '[:lower:]' '[:upper:]' < "$f")"
            echo "$upper" | grep -q 'BEGIN;' || { echo "Missing BEGIN; in $f"; bad=1; }
            echo "$upper" | grep -q 'COMMIT;' || { echo "Missing COMMIT; in $f"; bad=1; }
          done
          if [ "$bad" -ne 0 ]; then
            exit 1
          fi
